            console.warn(`[GPU] Single buffer (${(texBytes/1024/1024).toFixed(0)} MB) failed, using batched upload`);
            useBatched = true;
        }

        gl.activeTexture(gl.TEXTURE0);
        gl.bindTexture(gl.TEXTURE_2D, dataTexture);

        if (!useBatched) {
            // ---- Single-buffer path (proven, used for <2 GB textures) ----
            for (let i = 0; i < N; i++) {
                packGaussian(texFloat, i * TEXELS_PER_GAUSS * 4, i);
            }
            console.log('[GPU] Static texture: ' + N + ' Gaussians, ' +
                dataTexW + 'x' + dataTexH + ' (' + (texBytes / 1024 / 1024).toFixed(1) + ' MB)');

            gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA32UI, dataTexW, dataTexH, 0,
                          gl.RGBA_INTEGER, gl.UNSIGNED_INT, texData);

        } else {
            // ---- Batched upload path (for >2 GB textures) ----
            // Allocate empty texture, fill via texSubImage2D in row batches.
            // Key: when flushing, copyWithin preserves partial-row data from
            // Gaussians straddling the flush boundary.
            gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA32UI, dataTexW, dataTexH, 0,
                          gl.RGBA_INTEGER, gl.UNSIGNED_INT, null);

            const ROW_BATCH = 1000;
            let batchRowStart = 0;
            let batchRowCount = Math.min(ROW_BATCH, dataTexH);
            let batchData = new Uint32Array(dataTexW * batchRowCount * 4);
            let batchFloat = new Float32Array(batchData.buffer);

            function flushRows(upToRow) {
                const rowsFlushed = upToRow - batchRowStart;
                if (rowsFlushed > 0) {
                    // Re-bind texture — async yields in the upload loop allow the
                    // render loop to run and bind different textures, unbinding ours.
                    gl.activeTexture(gl.TEXTURE0);
                    gl.bindTexture(gl.TEXTURE_2D, dataTexture);
                    gl.texSubImage2D(gl.TEXTURE_2D, 0, 0, batchRowStart, dataTexW, rowsFlushed,
                        gl.RGBA_INTEGER, gl.UNSIGNED_INT,
                        batchData.subarray(0, dataTexW * rowsFlushed * 4));
                }
                // Shift unflushed row data to the beginning of the buffer,
                // preserving texels from Gaussians that straddle the boundary.
                const flushedEls = rowsFlushed * dataTexW * 4;
                const totalEls = batchRowCount * dataTexW * 4;
                const remainEls = totalEls - flushedEls;

                batchRowStart = upToRow;
                batchRowCount = Math.min(ROW_BATCH, dataTexH - batchRowStart);
                if (batchRowCount <= 0) return;

                const needed = dataTexW * batchRowCount * 4;
                if (needed > batchData.length) {
                    const oldData = batchData;
                    batchData = new Uint32Array(needed);
                    batchFloat = new Float32Array(batchData.buffer);
                    if (remainEls > 0) batchData.set(oldData.subarray(flushedEls, flushedEls + Math.min(remainEls, needed)));
                    if (remainEls < needed) batchData.fill(0, remainEls);
                } else {
                    if (remainEls > 0 && flushedEls > 0) {
                        batchData.copyWithin(0, flushedEls, flushedEls + remainEls);
                    }
                    batchData.fill(0, Math.min(remainEls, needed));
                }
            }

            const YIELD_EVERY = 100000;
            // Streaming: batch-load gaussian/KF data from file in chunks
            const GAUSS_STREAM_BATCH = 100000;
            const KF_GAUSS_BATCH = 100000;
            let gaussBatchEnd = isGaussStreaming ? 0 : N;
            let kfBatchEnd = isStreaming ? 0 : N;

            for (let i = 0; i < N; i++) {
                // Stream-load next gaussian base data batch from file if needed
                if (isGaussStreaming && i >= gaussBatchEnd) {
                    const bStart = i;
                    const bEnd = Math.min(bStart + GAUSS_STREAM_BATCH, N);
                    const bCount = bEnd - bStart;
                    const byteOff = _gaussStreamDataOffset + bStart * fpg * 4;
                    const byteLen = bCount * fpg * 4;
                    const buf = await _gaussStreamFile.slice(byteOff, byteOff + byteLen).arrayBuffer();
                    _gaussBatchData = new Float32Array(buf);
                    _gaussBatchStart = bStart;
                    gaussBatchEnd = bEnd;
                }

                // Stream-load next KF batch from file if needed
                if (isStreaming && i >= kfBatchEnd) {
                    const bStart = i;
                    const bEnd = Math.min(bStart + KF_GAUSS_BATCH, N);
                    const bCount = bEnd - bStart;
                    const fK = _kfStreamOffsets.fileK;
                    const batchNum = Math.floor(bStart / KF_GAUSS_BATCH) + 1;
                    const totalBatches = Math.ceil(N / KF_GAUSS_BATCH);
                    loadStatus.textContent = `Streaming keyframes batch ${batchNum}/${totalBatches}...`;

                    const posOff = _kfStreamOffsets.posStart + bStart * fK * 3 * 4;
                    const posBuf = await _kfStreamFile.slice(posOff, posOff + bCount * fK * 3 * 4).arrayBuffer();
                    header.keyframePositions = new Float32Array(posBuf);

                    if (_kfStreamOffsets.hasV3) {
                        const rotOff = _kfStreamOffsets.rotStart + bStart * fK * 4 * 4;
                        header.keyframeRotations = new Float32Array(
                            await _kfStreamFile.slice(rotOff, rotOff + bCount * fK * 4 * 4).arrayBuffer());

                        const scaleOff = _kfStreamOffsets.scaleStart + bStart * fK * 3 * 4;
                        header.keyframeScales = new Float32Array(
                            await _kfStreamFile.slice(scaleOff, scaleOff + bCount * fK * 3 * 4).arrayBuffer());
                    }

                    _kfBatchOffset = bStart;
                    kfBatchEnd = bEnd;
                    await new Promise(r => setTimeout(r, 0)); // yield after file reads
                }

                const texelStart = i * TEXELS_PER_GAUSS;
                const gaussLastRow = Math.floor((texelStart + TEXELS_PER_GAUSS - 1) / dataTexW);

                if (gaussLastRow >= batchRowStart + batchRowCount) {
                    flushRows(Math.floor(texelStart / dataTexW));
                }

                const localTexel = texelStart - batchRowStart * dataTexW;
                packGaussian(batchFloat, localTexel * 4, i);

                // Yield to browser periodically to avoid "slow script" dialog
                if (i % YIELD_EVERY === 0 && i > 0) {
                    loadFill.style.width = (70 + 8 * i / N).toFixed(1) + '%';
                    loadStatus.textContent = `Building GPU texture... ${((i/N)*100).toFixed(0)}%`;
                    await new Promise(r => setTimeout(r, 0));
                }
            }
            flushRows(dataTexH); // flush remaining

            // Clean up streaming state
            // Clean up gaussian streaming state
            if (isGaussStreaming) {
                _gaussStreamFile = null;
                _gaussStreamDataOffset = 0;
                _gaussBatchData = null;
                _gaussBatchStart = 0;
            }
            if (isStreaming) {
                _kfStreamFile = null;
                _kfStreamOffsets = null;
                _kfBatchOffset = 0;
                header.keyframePositions = null;
                header.keyframeRotations = null;
                header.keyframeScales = null;
            }

            console.log('[GPU] Static texture: ' + N + ' Gaussians, ' +
                dataTexW + 'x' + dataTexH + ' (' + (texBytes / 1024 / 1024).toFixed(1) + ' MB) — batched upload' +
                (isGaussStreaming ? ' (gauss streamed)' : '') +
                (isStreaming ? ' (kf streamed)' : ''));
        }

        // Debug: verify first Gaussian from source arrays (skip if streamed — data freed)
        if (_gaussianData) {
            console.log('[GPU] Gauss 0 packed: pos=',
                _gaussianData[0], _gaussianData[1], _gaussianData[2], 'opa_logit=', _gaussianData[10]);
            console.log('[GPU] Gauss 0 cov=',
                cov3DCache[0], cov3DCache[1], cov3DCache[2], cov3DCache[3], cov3DCache[4], cov3DCache[5]);
            console.log('[GPU] Gauss 0 temporal: mu_t=', _gaussianData[temporalOffset],
                'dur=', _gaussianData[temporalOffset+1],
                'vel=', _gaussianData[temporalOffset+2], _gaussianData[temporalOffset+3], _gaussianData[temporalOffset+4]);
            console.log('[GPU] Gauss 0 sh0=', _gaussianData[11], _gaussianData[12], _gaussianData[13]);
        } else {
            console.log('[GPU] Gauss 0 cov=',
                cov3DCache[0], cov3DCache[1], cov3DCache[2], cov3DCache[3], cov3DCache[4], cov3DCache[5]);
        }

        // Debug keyframe data (uses fileKeyframes for indexing raw arrays)
        // Skip in streaming mode — KF/gaussian arrays were freed after texture packing
        if (nKeyframes > 0 && !isStreaming && !isGaussStreaming && _gaussianData) {
            console.log(`[KF-Debug] ${nKeyframes}${kfIndices ? '/'+fileKeyframes : ''} keyframes, ${N} Gaussians`);
            let dynIdx = -1;
            for (let i = 0; i < N && dynIdx < 0; i++) {
                const gOff = i * fpg;
                const vx = _gaussianData[gOff + temporalOffset + 2];
                const vy = _gaussianData[gOff + temporalOffset + 3];
                const vz = _gaussianData[gOff + temporalOffset + 4];
                if (Math.abs(vx) + Math.abs(vy) + Math.abs(vz) > 0.001) dynIdx = i;
            }
            if (dynIdx >= 0) {
                console.log(`[KF-Debug] First dynamic Gaussian ${dynIdx}:`);
                const gOff = dynIdx * fpg;
                console.log(`  canonPos = (${_gaussianData[gOff].toFixed(4)}, ${_gaussianData[gOff+1].toFixed(4)}, ${_gaussianData[gOff+2].toFixed(4)})`);
                for (let k = 0; k < Math.min(3, fileKeyframes); k++) {
                    const srcBase = dynIdx * fileKeyframes * 3;
                    const sx = header.keyframePositions[srcBase + k*3];
                    const sy = header.keyframePositions[srcBase + k*3+1];
                    const sz = header.keyframePositions[srcBase + k*3+2];
                    console.log(`  kf[${k}] t=${header.keyframeTimes ? header.keyframeTimes[k].toFixed(2) : '?'}: pos=(${sx.toFixed(4)}, ${sy.toFixed(4)}, ${sz.toFixed(4)})`);
                }
            }
        } else if (isStreaming || isGaussStreaming) {
            console.log(`[KF-Debug] ${nKeyframes}${kfIndices ? '/'+fileKeyframes : ''} keyframes, ${N} Gaussians (streamed — arrays freed)`);
        }

        // Diagnostic: compare pre-baked cov vs v3 keyframe midpoint
        // Skip in streaming mode — KF arrays were freed
        const fK = fileKeyframes;
        if (hasRotScaleKF && !isStreaming && header.keyframeRotations && header.keyframeScales) {
            const midK = Math.floor(fK / 2);
            console.log(`[Cov-Check] pre-baked vs keyframe[${midK}] for first 3 Gaussians:`);
            for (let gi = 0; gi < Math.min(3, N); gi++) {
                const cBase = gi * 6;
                const pbCov = [cov3DCache[cBase], cov3DCache[cBase+1], cov3DCache[cBase+2],
                               cov3DCache[cBase+3], cov3DCache[cBase+4], cov3DCache[cBase+5]];
                const rotBase = gi * fK * 4 + midK * 4;
                const scaleBase = gi * fK * 3 + midK * 3;
                const qw=header.keyframeRotations[rotBase], qx=header.keyframeRotations[rotBase+1],
                      qy=header.keyframeRotations[rotBase+2], qz=header.keyframeRotations[rotBase+3];
                let len = Math.sqrt(qw*qw+qx*qx+qy*qy+qz*qz)+1e-10;
                let nw=qw/len, nx=qx/len, ny=qy/len, nz=qz/len;
                if(nw<0){nw=-nw;nx=-nx;ny=-ny;nz=-nz;}
                const xx=nx*nx,yy=ny*ny,zz=nz*nz,xy=nx*ny,xz=nx*nz,yz=ny*nz;
                const wx=nw*nx,wy=nw*ny,wz=nw*nz;
                const r00=1-2*(yy+zz),r01=2*(xy-wz),r02=2*(xz+wy);
                const r10=2*(xy+wz),r11=1-2*(xx+zz),r12=2*(yz-wx);
                const r20=2*(xz-wy),r21=2*(yz+wx),r22=1-2*(xx+yy);
                const esx=Math.exp(header.keyframeScales[scaleBase]),
                      esy=Math.exp(header.keyframeScales[scaleBase+1]),
                      esz=Math.exp(header.keyframeScales[scaleBase+2]);
                const m00=r00*esx,m01=r01*esy,m02=r02*esz,
                      m10=r10*esx,m11=r11*esy,m12=r12*esz,
                      m20=r20*esx,m21=r21*esy,m22=r22*esz;
                const kfCov=[m00*m00+m01*m01+m02*m02,m00*m10+m01*m11+m02*m12,m00*m20+m01*m21+m02*m22,
                             m10*m10+m11*m11+m12*m12,m10*m20+m11*m21+m12*m22,m20*m20+m21*m21+m22*m22];
                let maxDiff=0;
                for(let j=0;j<6;j++)maxDiff=Math.max(maxDiff,Math.abs(pbCov[j]-kfCov[j]));
                const match=maxDiff<1e-4?'MATCH':`MISMATCH(${maxDiff.toExponential(3)})`;
                console.log(`  G${gi}: ${match}`);
            }
        }

        // Check GL errors
        {
            const err = gl.getError();
            if (err !== 0) console.error('[GPU] texture upload error:', err);
            else console.log('[GPU] Texture uploaded successfully');
        }

        // Free CPU-side data (worker has its own compact sort buffer)
        _cov3DAll = null;
        loadFill.style.width = '80%';
        loadStatus.textContent = 'Initial sort...';

        // Request first sort
        requestSort();
    }

    function initWebGL() {
        const vs = compileShader(gl.VERTEX_SHADER, VERT_SRC);
        const fs = compileShader(gl.FRAGMENT_SHADER, FRAG_SRC);
        program = gl.createProgram();
        gl.attachShader(program, vs);
        gl.attachShader(program, fs);
        gl.linkProgram(program);
        if (!gl.getProgramParameter(program, gl.LINK_STATUS)) {
            console.error('Link error:', gl.getProgramInfoLog(program));
            return;
        }

        // Uniform locations
        u_dataTexture = gl.getUniformLocation(program, 'u_dataTexture');
        u_dataTexW = gl.getUniformLocation(program, 'u_dataTexW');
        u_texelsPerGauss = gl.getUniformLocation(program, 'u_texelsPerGauss');
        u_nKeyframes = gl.getUniformLocation(program, 'u_nKeyframes');
        u_hasRotScaleKF = gl.getUniformLocation(program, 'u_hasRotScaleKF');
        u_view = gl.getUniformLocation(program, 'u_view');
        u_viewport = gl.getUniformLocation(program, 'u_viewport');
        u_focal = gl.getUniformLocation(program, 'u_focal');
        u_time = gl.getUniformLocation(program, 'u_time');
        u_sharpnessK = gl.getUniformLocation(program, 'u_sharpnessK');
        u_temporalProfile = gl.getUniformLocation(program, 'u_temporalProfile');
        u_lifespanVelocity = gl.getUniformLocation(program, 'u_lifespanVelocity');
        u_lifespanRef = gl.getUniformLocation(program, 'u_lifespanRef');
        u_durClampMin = gl.getUniformLocation(program, 'u_durClampMin');
        u_durClampMax = gl.getUniformLocation(program, 'u_durClampMax');
        u_camPos = gl.getUniformLocation(program, 'u_camPos');
        u_renderSHDeg = gl.getUniformLocation(program, 'u_renderSHDeg');
        u_maxScale = gl.getUniformLocation(program, 'u_maxScale');
        u_minOpacity = gl.getUniformLocation(program, 'u_minOpacity');
        u_visualMode = gl.getUniformLocation(program, 'u_visualMode');
        u_pointSize = gl.getUniformLocation(program, 'u_pointSize');
        u_ringSize = gl.getUniformLocation(program, 'u_ringSize');
        u_gammaCorrect = gl.getUniformLocation(program, 'u_gammaCorrect');
        u_sceneExtent = gl.getUniformLocation(program, 'u_sceneExtent');

        // Create static data texture
        dataTexture = gl.createTexture();
        gl.activeTexture(gl.TEXTURE0);
        gl.bindTexture(gl.TEXTURE_2D, dataTexture);
        gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.NEAREST);
        gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.NEAREST);
        gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
        gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);

        // Create VAO
        vao = gl.createVertexArray();
        gl.bindVertexArray(vao);

        // Quad vertices
        const quadData = new Float32Array([-1,-1, 1,-1, -1,1, 1,1]);
        const quadBuf = gl.createBuffer();
        gl.bindBuffer(gl.ARRAY_BUFFER, quadBuf);
        gl.bufferData(gl.ARRAY_BUFFER, quadData, gl.STATIC_DRAW);
        const a_quad = gl.getAttribLocation(program, 'a_quad');
        gl.enableVertexAttribArray(a_quad);
        gl.vertexAttribPointer(a_quad, 2, gl.FLOAT, false, 0, 0);

        // Index buffer for sorted Gaussian IDs (per-instance)
        indexBuffer = gl.createBuffer();
        gl.bindBuffer(gl.ARRAY_BUFFER, indexBuffer);
        const a_splatIdx = gl.getAttribLocation(program, 'a_splatIdx');
        gl.enableVertexAttribArray(a_splatIdx);
        gl.vertexAttribIPointer(a_splatIdx, 1, gl.UNSIGNED_INT, 0, 0);
        gl.vertexAttribDivisor(a_splatIdx, 1);

        gl.bindVertexArray(null);

        // Back-to-front premultiplied alpha blending (matches SuperSplat/PlayCanvas).
        // Sorted farthest-first: each new fragment composites ON TOP of existing buffer.
        // More robust to global sorting errors: foreground draws last and correctly
        // covers background, even if some background Gaussians were mis-sorted.
        gl.enable(gl.BLEND);
        gl.blendFuncSeparate(
            gl.ONE, gl.ONE_MINUS_SRC_ALPHA,
            gl.ONE, gl.ONE_MINUS_SRC_ALPHA
        );
        gl.disable(gl.DEPTH_TEST);

        // ---- Float FBO setup ----
        // Enable float color buffer rendering (RGBA32F)
        const extCBF = gl.getExtension('EXT_color_buffer_float');
        const extFB = gl.getExtension('EXT_float_blend');
        if (!extCBF) {
            console.warn('[FBO] EXT_color_buffer_float not available, falling back to uint8 canvas');
        } else if (!extFB) {
            console.warn('[FBO] EXT_float_blend not available, float blending disabled — falling back to uint8 canvas');
        } else {
            // Compile blit shader
            const blitVS = compileShader(gl.VERTEX_SHADER, BLIT_VERT);
            const blitFS = compileShader(gl.FRAGMENT_SHADER, BLIT_FRAG);
            blitProgram = gl.createProgram();
            gl.attachShader(blitProgram, blitVS);
            gl.attachShader(blitProgram, blitFS);
            gl.linkProgram(blitProgram);
            if (!gl.getProgramParameter(blitProgram, gl.LINK_STATUS)) {
                console.error('[FBO] Blit program link error:', gl.getProgramInfoLog(blitProgram));
                blitProgram = null;
            } else {
                u_blit_tex = gl.getUniformLocation(blitProgram, 'u_tex');
                u_blit_saturation = gl.getUniformLocation(blitProgram, 'u_saturation');
                u_blit_contrast = gl.getUniformLocation(blitProgram, 'u_contrast');

                // Create blit VAO (fullscreen quad)
                blitVAO = gl.createVertexArray();
                gl.bindVertexArray(blitVAO);
                const blitQuad = new Float32Array([-1,-1, 1,-1, -1,1, 1,1]);
                const blitBuf = gl.createBuffer();
                gl.bindBuffer(gl.ARRAY_BUFFER, blitBuf);
                gl.bufferData(gl.ARRAY_BUFFER, blitQuad, gl.STATIC_DRAW);
                const a_blit_pos = gl.getAttribLocation(blitProgram, 'a_pos');
                gl.enableVertexAttribArray(a_blit_pos);
                gl.vertexAttribPointer(a_blit_pos, 2, gl.FLOAT, false, 0, 0);
                gl.bindVertexArray(null);

                console.log('[FBO] Float FBO initialized (RGBA32F + gamma-correct blending, EXT_float_blend: OK)');
            }
        }
    }

    function compileShader(type, src) {
        const shader = gl.createShader(type);
        gl.shaderSource(shader, src);
        gl.compileShader(shader);
        if (!gl.getShaderParameter(shader, gl.COMPILE_STATUS)) {
            console.error('Shader error:', gl.getShaderInfoLog(shader));
            console.error('Source:', src);
        }
        return shader;
    }

    let pendingResort = false;

    function onSortResult(msg) {
        sortPending = false;
        if (msg.sortedTime !== undefined) lastSortedTime = msg.sortedTime;
        let sortedIdx = new Uint32Array(msg.sortedIdx);
        visibleCount = msg.visCount;

        // Save unmodified copy for eraser hit testing
        lastSortedIndices = new Uint32Array(sortedIdx);

        // Filter out deleted Gaussians (into a separate array to avoid corrupting lastSortedIndices)
        if (deletedSet.size > 0) {
            const filtered = new Uint32Array(sortedIdx.length);
            let writeIdx = 0;
            for (let i = 0; i < sortedIdx.length; i++) {
                if (!deletedSet.has(sortedIdx[i])) {
                    filtered[writeIdx++] = sortedIdx[i];
                }
            }
            sortedIdx = filtered.subarray(0, writeIdx);
            visibleCount = writeIdx;
        }

        document.getElementById('visibleVal').textContent =
            `${visibleCount.toLocaleString()} / ${msg.totalCount.toLocaleString()}`;
        document.getElementById('sortTime').textContent = msg.sortMs.toFixed(1);

        if (visibleCount === 0) return;

        // Upload the sorted index buffer (~2.5MB for 627k Gaussians)
        gl.bindBuffer(gl.ARRAY_BUFFER, indexBuffer);
        gl.bufferData(gl.ARRAY_BUFFER, sortedIdx, gl.DYNAMIC_DRAW);

        vertexCount = visibleCount;

        // Show UI on first result
        if (loading && !loading.classList.contains('hidden')) {
            loading.classList.add('hidden');
            topbar.style.display = 'flex';
            bottombar.classList.remove('hidden');
            loadFill.style.width = '100%';
        }

        // If camera moved while sorting, re-sort immediately
        if (pendingResort) {
            pendingResort = false;
            requestSort();
        }
    }

    function requestSort() {
        if (sortPending) {
            pendingResort = true;
            return;
        }
        sortPending = true;

        // Pass current time for velocity-adjusted sort depth + temporal culling
        const t = (header && header.total_frames > 1)
            ? currentFrame / (header.total_frames - 1) : 0.0;
        const viewMat = getViewMatrix();
        worker.postMessage({
            type: 'sort',
            viewMat: Array.from(viewMat),
            time: t,
            sharpnessK: header ? (header.sharpness_k || 50.0) : 50.0,
            lifespanVelocity: header && header.lifespan_velocity ? 1.0 : 0.0,
            lifespanRef: header ? (header.lifespan_ref || 1.0) : 1.0,
            durClampMin: header ? (header.duration_clamp_min || 0.0) : 0.0,
            durClampMax: header ? (header.duration_clamp_max || 1.0) : 1.0,
            temporalProfile: header ? (header.temporal_profile || 0) : 0,
        });
    }

    // ---- Matrix math ----

    // Scene correction rotation from Pitch/Roll/Yaw sliders (degrees).
    // Returns a 4x4 column-major rotation matrix (rotates scene around origin).
    function getSceneCorrectionMatrix() {
        const pitch = parseFloat(document.getElementById('scenePitch').value) || 0;
        const roll  = parseFloat(document.getElementById('sceneRoll').value)  || 0;
        const yaw   = parseFloat(document.getElementById('sceneYaw').value)   || 0;
        if (pitch === 0 && roll === 0 && yaw === 0) return null; // identity, skip
        const d2r = Math.PI / 180;
        const p = pitch * d2r, r = roll * d2r, y = yaw * d2r;
        const cp = Math.cos(p), sp = Math.sin(p);
        const cr = Math.cos(r), sr = Math.sin(r);
        const cy = Math.cos(y), sy = Math.sin(y);
        // Rz(yaw) * Rx(pitch) * Ry(roll)  — standard Euler, column-major
        return new Float32Array([
            cy*cr + sy*sp*sr,   cp*sr,  -sy*cr + cy*sp*sr,  0,
            -cy*sr + sy*sp*cr,  cp*cr,  sy*sr + cy*sp*cr,   0,
            sy*cp,              -sp,    cy*cp,               0,
            0,                  0,      0,                   1,
        ]);
    }

    // Multiply two 4x4 column-major matrices: result = A * B
    function mat4Mul(A, B) {
        const o = new Float32Array(16);
        for (let c = 0; c < 4; c++)
            for (let r = 0; r < 4; r++)
                o[c*4+r] = A[r]*B[c*4] + A[4+r]*B[c*4+1] + A[8+r]*B[c*4+2] + A[12+r]*B[c*4+3];
        return o;
    }

    // Multiply 4x4 column-major matrix by vec4, returns vec4
    function mat4MulVec4(M, v) {
        return [
            M[0]*v[0] + M[4]*v[1] + M[8]*v[2]  + M[12]*v[3],
            M[1]*v[0] + M[5]*v[1] + M[9]*v[2]  + M[13]*v[3],
            M[2]*v[0] + M[6]*v[1] + M[10]*v[2] + M[14]*v[3],
            M[3]*v[0] + M[7]*v[1] + M[11]*v[2] + M[15]*v[3],
        ];
    }

    // Invert a 4x4 column-major matrix (returns null if singular)
    function mat4Inverse(m) {
        const inv = new Float32Array(16);
        inv[0]  =  m[5]*m[10]*m[15] - m[5]*m[11]*m[14] - m[9]*m[6]*m[15] + m[9]*m[7]*m[14] + m[13]*m[6]*m[11] - m[13]*m[7]*m[10];
        inv[4]  = -m[4]*m[10]*m[15] + m[4]*m[11]*m[14] + m[8]*m[6]*m[15] - m[8]*m[7]*m[14] - m[12]*m[6]*m[11] + m[12]*m[7]*m[10];
        inv[8]  =  m[4]*m[9]*m[15]  - m[4]*m[11]*m[13] - m[8]*m[5]*m[15] + m[8]*m[7]*m[13] + m[12]*m[5]*m[11] - m[12]*m[7]*m[9];
        inv[12] = -m[4]*m[9]*m[14]  + m[4]*m[10]*m[13] + m[8]*m[5]*m[14] - m[8]*m[6]*m[13] - m[12]*m[5]*m[10] + m[12]*m[6]*m[9];
        inv[1]  = -m[1]*m[10]*m[15] + m[1]*m[11]*m[14] + m[9]*m[2]*m[15] - m[9]*m[3]*m[14] - m[13]*m[2]*m[11] + m[13]*m[3]*m[10];
        inv[5]  =  m[0]*m[10]*m[15] - m[0]*m[11]*m[14] - m[8]*m[2]*m[15] + m[8]*m[3]*m[14] + m[12]*m[2]*m[11] - m[12]*m[3]*m[10];
        inv[9]  = -m[0]*m[9]*m[15]  + m[0]*m[11]*m[13] + m[8]*m[1]*m[15] - m[8]*m[3]*m[13] - m[12]*m[1]*m[11] + m[12]*m[3]*m[9];
        inv[13] =  m[0]*m[9]*m[14]  - m[0]*m[10]*m[13] - m[8]*m[1]*m[14] + m[8]*m[2]*m[13] + m[12]*m[1]*m[10] - m[12]*m[2]*m[9];
        inv[2]  =  m[1]*m[6]*m[15]  - m[1]*m[7]*m[14]  - m[5]*m[2]*m[15] + m[5]*m[3]*m[14] + m[13]*m[2]*m[7]  - m[13]*m[3]*m[6];
        inv[6]  = -m[0]*m[6]*m[15]  + m[0]*m[7]*m[14]  + m[4]*m[2]*m[15] - m[4]*m[3]*m[14] - m[12]*m[2]*m[7]  + m[12]*m[3]*m[6];
        inv[10] =  m[0]*m[5]*m[15]  - m[0]*m[7]*m[13]  - m[4]*m[1]*m[15] + m[4]*m[3]*m[13] + m[12]*m[1]*m[7]  - m[12]*m[3]*m[5];
        inv[14] = -m[0]*m[5]*m[14]  + m[0]*m[6]*m[13]  + m[4]*m[1]*m[14] - m[4]*m[2]*m[13] - m[12]*m[1]*m[6]  + m[12]*m[2]*m[5];
        inv[3]  = -m[1]*m[6]*m[11]  + m[1]*m[7]*m[10]  + m[5]*m[2]*m[11] - m[5]*m[3]*m[10] - m[9]*m[2]*m[7]   + m[9]*m[3]*m[6];
        inv[7]  =  m[0]*m[6]*m[11]  - m[0]*m[7]*m[10]  - m[4]*m[2]*m[11] + m[4]*m[3]*m[10] + m[8]*m[2]*m[7]   - m[8]*m[3]*m[6];
        inv[11] = -m[0]*m[5]*m[11]  + m[0]*m[7]*m[9]   + m[4]*m[1]*m[11] - m[4]*m[3]*m[9]  - m[8]*m[1]*m[7]   + m[8]*m[3]*m[5];
        inv[15] =  m[0]*m[5]*m[10]  - m[0]*m[6]*m[9]   - m[4]*m[1]*m[10] + m[4]*m[2]*m[9]  + m[8]*m[1]*m[6]   - m[8]*m[2]*m[5];
        const det = m[0]*inv[0] + m[1]*inv[4] + m[2]*inv[8] + m[3]*inv[12];
        if (Math.abs(det) < 1e-10) return null;
        const invDet = 1 / det;
        for (let i = 0; i < 16; i++) inv[i] *= invDet;
        return inv;
    }

    // Build a perspective projection matrix (column-major) from camera.fov
    function getProjectionMatrix(aspect) {
        const near = 0.1, far = 1000;
        const fov = camera.fov || (45 * Math.PI / 180);
        const top = near * Math.tan(fov / 2);
        const right = top * aspect;
        const P = new Float32Array(16);
        P[0]  = near / right;
        P[5]  = near / top;
        P[10] = -(far + near) / (far - near);
        P[11] = -1;
        P[14] = -2*far*near / (far - near);
        return P;
    }

    function getViewMatrix() {
        let V;
        // When locked to a training camera, compute view matrix directly from c2w
        // to avoid any numerical issues with lookAt reconstruction
        if (activeTrainingCam >= 0 && header && header.trainingCameras) {
            const c = header.trainingCameras[activeTrainingCam].c2w;
            const r00=c[0], r01=c[1], r02=c[2], tx=c[3];
            const r10=c[4], r11=c[5], r12=c[6], ty=c[7];
            const r20=c[8], r21=c[9], r22=c[10], tz=c[11];
            const vtx = -(r00*tx + r10*ty + r20*tz);
            const vty = -(r01*tx + r11*ty + r21*tz);
            const vtz = -(r02*tx + r12*ty + r22*tz);
            V = new Float32Array([
                r00, r01, r02, 0,
                r10, r11, r12, 0,
                r20, r21, r22, 0,
                vtx, vty, vtz, 1,
            ]);
        } else {
            V = lookAt(camera.position, camera.target, camera.up);
        }
        // Apply scene correction: V' = V * R_correction
        // This rotates the scene (all Gaussian positions) by R before the camera sees them
        // Skip scene correction when locked to a training camera — must match exact training view
        if (activeTrainingCam >= 0) return V;
        const R = getSceneCorrectionMatrix();
        return R ? mat4Mul(V, R) : V;
    }

    function lookAt(eye, center, upDir) {
        // Produce a view matrix matching gsplat's inv(c2w) convention:
        //   row 0 = right   = cross(forward, up)       [X-axis]
        //   row 1 = down    = cross(forward, right)     [Y-axis, points down in image]
        //   row 2 = forward = normalize(center - eye)   [Z-axis, into scene]
        // upDir should be the actual "world up" direction.
        // In COLMAP/gsplat CV convention: camera looks along +Z, Y points down.
        // Stored column-major for WebGL.
        const forward = normalize(sub(center, eye));
        let right = cross(forward, upDir);
        const rightLen = Math.sqrt(right[0]*right[0] + right[1]*right[1] + right[2]*right[2]);
        if (rightLen < 1e-4) {
            // Forward is nearly parallel to up — pick a fallback up direction.
            // Use the axis least aligned with forward to build a stable frame.
            const ax = Math.abs(forward[0]), ay = Math.abs(forward[1]), az = Math.abs(forward[2]);
            const fallback = ax < ay ? (ax < az ? [1,0,0] : [0,0,1])
                                     : (ay < az ? [0,1,0] : [0,0,1]);
            right = cross(forward, fallback);
        }
        right = normalize(right);
        const down = cross(forward, right);  // = -up orthogonalized
        return new Float32Array([
            right[0],   down[0],   forward[0],   0,
            right[1],   down[1],   forward[1],   0,
            right[2],   down[2],   forward[2],   0,
            -dot3(right, eye), -dot3(down, eye), -dot3(forward, eye), 1,
        ]);
    }

    function sub(a, b) { return [a[0]-b[0], a[1]-b[1], a[2]-b[2]]; }
    function dot3(a, b) { return a[0]*b[0] + a[1]*b[1] + a[2]*b[2]; }
    function cross(a, b) {
        return [a[1]*b[2]-a[2]*b[1], a[2]*b[0]-a[0]*b[2], a[0]*b[1]-a[1]*b[0]];
    }
    function normalize(v) {
        const len = Math.sqrt(v[0]*v[0] + v[1]*v[1] + v[2]*v[2]) + 1e-10;
        return [v[0]/len, v[1]/len, v[2]/len];
    }
    function length3(v) { return Math.sqrt(v[0]*v[0] + v[1]*v[1] + v[2]*v[2]); }

    // ---- Camera controls (SuperSplat-style azim/elev + damped tweens) ----

    // Damped tween helper — smoothly interpolates values with configurable damping
    // Supports velocity tracking for momentum on release
    function createTween(initial) {
        const state = {
            value: { ...initial }, target: { ...initial }, damping: 0,
            velocity: {},  // per-key velocity for momentum
            momentum: false,
        };
        for (const k in initial) state.velocity[k] = 0;
        return {
            get value() { return state.value; },
            get target() { return state.target; },
            // Instant move (during drag) — value snaps directly, tracks velocity
            move(delta) {
                for (const k in delta) {
                    state.value[k] += delta[k];
                    state.target[k] = state.value[k];
                    state.velocity[k] = delta[k]; // raw per-frame velocity
                }
                state.momentum = false;
            },
            // Start coasting with current velocity (on mouse release)
            coast(friction) {
                state.momentum = true;
                state.damping = friction;
            },
            goto(target, damping) {
                for (const k in target) state.target[k] = target[k];
                state.damping = Math.max(0, damping);
                state.momentum = false;
            },
            snap(target) {
                for (const k in target) {
                    state.value[k] = target[k]; state.target[k] = target[k];
                    state.velocity[k] = 0;
                }
                state.damping = 0;
                state.momentum = false;
            },
            update(dt) {
                if (state.momentum) {
                    // Decay velocity and apply
                    const decay = Math.exp(-dt / state.damping);
                    let moving = false;
                    for (const k in state.velocity) {
                        state.velocity[k] *= decay;
                        if (Math.abs(state.velocity[k]) > 1e-6) {
                            state.value[k] += state.velocity[k];
                            state.target[k] = state.value[k];
                            moving = true;
                        } else {
                            state.velocity[k] = 0;
                        }
                    }
                    if (!moving) state.momentum = false;
                    return moving;
                }
                if (state.damping <= 0) {
                    for (const k in state.target) state.value[k] = state.target[k];
                    return false;
                }
                // Exponential damping toward target
                const factor = 1 - Math.exp(-dt / state.damping);
                let moving = false;
                for (const k in state.target) {
                    const diff = state.target[k] - state.value[k];
                    if (Math.abs(diff) > 1e-6) moving = true;
                    state.value[k] += diff * factor;
                }
                return moving;
            },
        };
    }

    // Compute azim/elev from current camera position relative to target
    function calcAzimElev(pos, target, upVec) {
        const offset = sub(pos, target);
        const dist = length3(offset);
        if (dist < 1e-8) return { azim: 0, elev: 0, dist };
        const dir = normalize(offset);
        // Elevation: angle from horizontal plane (defined by upVec)
        const dotUp = dot3(dir, upVec);
        const elev = Math.asin(Math.max(-1, Math.min(1, dotUp))) * (180 / Math.PI);
        // Azimuth: angle in horizontal plane
        // Project dir onto plane perpendicular to up
        const horiz = [dir[0] - upVec[0]*dotUp, dir[1] - upVec[1]*dotUp, dir[2] - upVec[2]*dotUp];
        const hLen = length3(horiz);
        let azim = 0;
        if (hLen > 1e-6) {
            const hn = normalize(horiz);
            // Build a reference frame in the horizontal plane
            // Use scene's "forward" as reference: pick an arbitrary horizontal axis
            // We'll use atan2 with the two horizontal components relative to sceneUp
            // For a generic up vector, compute two orthogonal horizontal axes
            let refRight, refFwd;
            const absUp = [Math.abs(upVec[0]), Math.abs(upVec[1]), Math.abs(upVec[2])];
            // Pick axis least aligned with up
            const hint = absUp[0] < absUp[1] ? (absUp[0] < absUp[2] ? [1,0,0] : [0,0,1])
                                               : (absUp[1] < absUp[2] ? [0,1,0] : [0,0,1]);
            refRight = normalize(cross(upVec, hint));
            refFwd = cross(refRight, upVec);
            azim = Math.atan2(dot3(hn, refRight), dot3(hn, refFwd)) * (180 / Math.PI);
        }
        return { azim, elev, dist };
    }

    // Compute camera position from azim/elev/dist relative to focalPoint
    function calcPosFromAzimElev(azim, elev, dist, focalPt, upVec) {
        const elevRad = elev * (Math.PI / 180);
        const azimRad = azim * (Math.PI / 180);
        // Same reference frame as calcAzimElev
        const absUp = [Math.abs(upVec[0]), Math.abs(upVec[1]), Math.abs(upVec[2])];
        const hint = absUp[0] < absUp[1] ? (absUp[0] < absUp[2] ? [1,0,0] : [0,0,1])
                                           : (absUp[1] < absUp[2] ? [0,1,0] : [0,0,1]);
        const refRight = normalize(cross(upVec, hint));
        const refFwd = cross(refRight, upVec);
        // Direction in horizontal plane
        const cosElev = Math.cos(elevRad);
        const sinElev = Math.sin(elevRad);
        const sinAzim = Math.sin(azimRad);
        const cosAzim = Math.cos(azimRad);
        // offset = (cosAzim*refFwd + sinAzim*refRight) * cosElev + upVec * sinElev
        const dir = [
            (cosAzim*refFwd[0] + sinAzim*refRight[0])*cosElev + upVec[0]*sinElev,
            (cosAzim*refFwd[1] + sinAzim*refRight[1])*cosElev + upVec[1]*sinElev,
            (cosAzim*refFwd[2] + sinAzim*refRight[2])*cosElev + upVec[2]*sinElev,
        ];
        return [focalPt[0] + dir[0]*dist, focalPt[1] + dir[1]*dist, focalPt[2] + dir[2]*dist];
    }

    // Initialize tweens (will be set properly when scene loads / camera snaps)
    const orbitTween = createTween({ azim: 0, elev: 0 });
    const distTween = createTween({ dist: 1 });
    const focalTween = createTween({ x: 0, y: 0, z: 0 });
    const coastFriction = 0.08; // seconds — momentum decay after release
    const smoothDamping = 0.15; // seconds — for animated transitions (double-click, zoom)
    let orbitInitialized = false;

    // Sync tweens from camera.position/target (called after camera snap)
    function syncTweensFromCamera() {
        const ae = calcAzimElev(camera.position, camera.target, sceneUp);
        orbitTween.snap({ azim: ae.azim, elev: ae.elev });
        distTween.snap({ dist: ae.dist });
        focalTween.snap({ x: camera.target[0], y: camera.target[1], z: camera.target[2] });
        orbitInitialized = true;
        // Start in look mode by default
        cameraMode = 'look';
        lookCameraPos = [...camera.position];
    }

    // Camera mode: 'look' (default) = camera stays in place, scene rotates
    //              'orbit' = camera orbits around focal point (after double-click)
    let cameraMode = 'look';
    let lookCameraPos = null; // fixed camera position during look mode

    // Apply tweens back to camera.position/target
    function applyTweensToCamera() {
        if (!orbitInitialized) return;
        const fp = focalTween.value;
        camera.target = [fp.x, fp.y, fp.z];

        if (lookCameraPos) {
            // Look mode: camera stays fixed, target moves
            camera.position = [...lookCameraPos];
        } else {
            // Orbit mode: camera moves on sphere around focal point
            camera.position = calcPosFromAzimElev(
                orbitTween.value.azim, orbitTween.value.elev,
                distTween.value.dist, camera.target, sceneUp
            );
        }
        camera.up = [...sceneUp];
    }

    // Look: rotate view in place (SuperSplat-style).
    // Camera stays fixed, focal point moves to match new azim/elev.
    function applyLook(dAzim, dElev) {
        const dist = distTween.value.dist;

        // Current camera position (from focal + offset)
        const fp = focalTween.value;
        const curFocal = [fp.x, fp.y, fp.z];
        const camPos = lookCameraPos || calcPosFromAzimElev(
            orbitTween.value.azim, orbitTween.value.elev,
            dist, curFocal, sceneUp
        );

        // Update azim/elev
        const cur = orbitTween.value;
        const newAzim = cur.azim + dAzim;
        const newElev = Math.max(-89, Math.min(89, cur.elev + dElev));
        orbitTween.snap({ azim: newAzim, elev: newElev });

        // Compute new focal point so camera stays at camPos
        // camPos = newFocal + direction(newAzim, newElev) * dist
        // => newFocal = camPos - direction(newAzim, newElev) * dist
        const dirFromFocal = calcPosFromAzimElev(newAzim, newElev, dist, [0,0,0], sceneUp);
        const newFocal = [
            camPos[0] - dirFromFocal[0],
            camPos[1] - dirFromFocal[1],
            camPos[2] - dirFromFocal[2],
        ];

        focalTween.snap({ x: newFocal[0], y: newFocal[1], z: newFocal[2] });
        lookCameraPos = [...camPos];
    }

    canvas.style.userSelect = 'none';
    canvas.style.webkitUserSelect = 'none';

    canvas.addEventListener('mousedown', (e) => {
        isDragging = true;
        dragButton = e.button;
        lastMouse = [e.clientX, e.clientY];
    });

    window.addEventListener('mouseup', () => {
        if (isDragging && orbitInitialized) {
            if (dragButton === 0) {
                orbitTween.coast(coastFriction);
                // In look mode, also coast the focal point to match
                if (cameraMode === 'look') focalTween.coast(coastFriction);
            } else {
                focalTween.coast(coastFriction);
            }
        }
        isDragging = false;
    });

    const orbitSensitivity = 0.3;  // degrees per pixel

    canvas.addEventListener('mousemove', (e) => {
        if (!isDragging || !header) return;
        const dx = e.clientX - lastMouse[0];
        const dy = e.clientY - lastMouse[1];
        lastMouse = [e.clientX, e.clientY];

        // Only exit training cam on first interaction, not every frame
        if (activeTrainingCam >= 0) exitTrainingCameraMode();
        if (!orbitInitialized) syncTweensFromCamera();

        if (dragButton === 0 && !e.ctrlKey) {
            if (cameraMode === 'look') {
                // Look mode: camera stays in place, scene rotates
                applyLook(-dx * orbitSensitivity, dy * orbitSensitivity);
            } else {
                // Orbit mode: camera circles around focal point
                const dAzim = -dx * orbitSensitivity;
                const cur = orbitTween.value;
                const rawElev = cur.elev + dy * orbitSensitivity;
                const dElev = Math.max(-89, Math.min(89, rawElev)) - cur.elev;
                orbitTween.move({ azim: dAzim, elev: dElev });
            }
        } else {
            // Pan: move focal point in screen space (both modes)
            const offset = sub(camera.position, camera.target);
            const dist = length3(offset);
            const vm = getViewMatrix();
            const right = [vm[0], vm[4], vm[8]];
            const down = [vm[1], vm[5], vm[9]];
            const scale = dist * 0.001;
            const moveX = -dx * scale;
            const moveY = -dy * scale;
            focalTween.move({
                x: right[0]*moveX + down[0]*moveY,
                y: right[1]*moveX + down[1]*moveY,
                z: right[2]*moveX + down[2]*moveY,
            });
            // In look mode, also move camera position to match
            if (lookCameraPos) {
                lookCameraPos[0] += right[0]*moveX + down[0]*moveY;
                lookCameraPos[1] += right[1]*moveX + down[1]*moveY;
                lookCameraPos[2] += right[2]*moveX + down[2]*moveY;
            }
        }
    });

    canvas.addEventListener('wheel', (e) => {
        if (!header) return;
        e.preventDefault();
        if (activeTrainingCam >= 0) exitTrainingCameraMode();
        if (!orbitInitialized) syncTweensFromCamera();

        const cur = distTween.value.dist;
        const amount = -e.deltaY * 0.001;
        const dollyDist = (cur * 0.999 + 0.001) * amount;
        const fwd = normalize(sub(camera.target, camera.position));

        if (cameraMode === 'look' && lookCameraPos) {
            // Look mode: move camera position forward/backward (dolly)
            lookCameraPos[0] += fwd[0] * dollyDist;
            lookCameraPos[1] += fwd[1] * dollyDist;
            lookCameraPos[2] += fwd[2] * dollyDist;
            // Also move focal point to keep same distance
            const fp = focalTween.value;
            focalTween.snap({
                x: fp.x + fwd[0] * dollyDist,
                y: fp.y + fwd[1] * dollyDist,
                z: fp.z + fwd[2] * dollyDist,
            });
        } else {
            // Orbit mode: shrink orbit radius (standard zoom)
            const newDist = cur - dollyDist;
            distTween.goto({ dist: Math.max(0.005, newDist) }, smoothDamping);
        }
    }, { passive: false });

    canvas.addEventListener('contextmenu', (e) => e.preventDefault());

    // Double-click: switch to orbit mode (like SuperSplat's pickFocalPoint).
    // Places orbit center at the point under cursor, switches from look→orbit mode.
    // In orbit mode, left-click orbits around that point.
    // Double-click again on empty space → back to look mode.
    canvas.addEventListener('dblclick', (e) => {
        e.preventDefault();
        if (!orbitInitialized || !header) return;

        if (cameraMode === 'orbit') {
            // Already in orbit mode — switch back to look mode
            cameraMode = 'look';
            lookCameraPos = [...camera.position];
            console.log('[Camera] Switched to LOOK mode');
            return;
        }

        // Switch from look → orbit mode
        // Shoot ray through clicked pixel, place focal point at orbit distance along ray
        const rect = canvas.getBoundingClientRect();
        const ndcX = ((e.clientX - rect.left) / rect.width) * 2 - 1;
        const ndcY = -(((e.clientY - rect.top) / rect.height) * 2 - 1);

        const vm = getViewMatrix();
        const camRight = [vm[0], vm[4], vm[8]];
        const camUp    = [-vm[1], -vm[5], -vm[9]];
        const camFwd   = [vm[2], vm[6], vm[10]];

        const aspect = canvas.width / canvas.height;
        const halfFovY = (camera.fov || (45 * Math.PI/180)) / 2;
        const halfH = Math.tan(halfFovY);
        const halfW = halfH * aspect;

        const rayDir = normalize([
            camFwd[0] + ndcX * halfW * camRight[0] + ndcY * halfH * camUp[0],
            camFwd[1] + ndcX * halfW * camRight[1] + ndcY * halfH * camUp[1],
            camFwd[2] + ndcX * halfW * camRight[2] + ndcY * halfH * camUp[2],
        ]);

        const orbitDist = distTween.value.dist;
        const newFocal = [
            camera.position[0] + rayDir[0] * orbitDist,
            camera.position[1] + rayDir[1] * orbitDist,
            camera.position[2] + rayDir[2] * orbitDist,
        ];

        // Keep camera position fixed — recalculate azim/elev/dist to new focal
        const savedPos = [...camera.position];
        const ae = calcAzimElev(savedPos, newFocal, sceneUp);

        focalTween.snap({ x: newFocal[0], y: newFocal[1], z: newFocal[2] });
        orbitTween.snap({ azim: ae.azim, elev: ae.elev });
        distTween.snap({ dist: ae.dist });

        // Switch to orbit mode — clear lookCameraPos so applyTweens uses orbit math
        lookCameraPos = null;
        cameraMode = 'orbit';
        console.log('[Camera] Switched to ORBIT mode, focal=', newFocal.map(v=>v.toFixed(3)));
        applyTweensToCamera();
        requestSort();
    });

    // ---- Playback controls ----
    btnPlay.addEventListener('click', togglePlay);
    speedSelect.addEventListener('change', () => {
        playSpeed = parseFloat(speedSelect.value);
    });
    timeSlider.addEventListener('input', () => {
        currentFrame = parseInt(timeSlider.value);
        frameLabel.textContent = `${currentFrame} / ${header.total_frames - 1}`;
        // Re-sort on manual time change (sort uses velocity-adjusted depth)
        if (worker && vertexCount > 0) requestSort();
    });

    // SH degree slider
    document.getElementById('shDegSlider').addEventListener('input', (e) => {
        document.getElementById('shDegVal').textContent = e.target.value;
    });

    function togglePlay() {
        playing = !playing;
        btnPlay.innerHTML = playing ? '&#9646;&#9646;' : '&#9654;';
    }

    window.addEventListener('keydown', (e) => {
        if (!header) return;
        switch(e.code) {
            case 'Space':
                e.preventDefault();
                togglePlay();
                break;
            case 'ArrowRight':
                e.preventDefault();
                currentFrame = Math.min(header.total_frames - 1, currentFrame + 1);
                timeSlider.value = currentFrame;
                frameLabel.textContent = `${currentFrame} / ${header.total_frames - 1}`;
                break;
            case 'ArrowLeft':
                e.preventDefault();
                currentFrame = Math.max(0, currentFrame - 1);
                timeSlider.value = currentFrame;
                frameLabel.textContent = `${currentFrame} / ${header.total_frames - 1}`;
                break;
            case 'Home':
                currentFrame = 0;
                timeSlider.value = 0;
                frameLabel.textContent = `0 / ${header.total_frames - 1}`;
                break;
            case 'End':
                currentFrame = header.total_frames - 1;
                timeSlider.value = currentFrame;
                frameLabel.textContent = `${currentFrame} / ${header.total_frames - 1}`;
                break;
            case 'Escape':
                // Return to orbit camera
                exitTrainingCameraMode();
                break;
        }
        // Debug toggles
        if (e.code === 'KeyK') {
            debugForcePrebakedCov = !debugForcePrebakedCov;
            console.log('[Debug] Force pre-baked covariance:', debugForcePrebakedCov);
            document.title = debugForcePrebakedCov ? '4DGS Viewer [PREBAKED COV]' : '4DGS Viewer';
        }
        if (e.code === 'KeyF' && !e.ctrlKey) {
            debugDisableFBO = !debugDisableFBO;
            console.log('[Debug] FBO disabled:', debugDisableFBO);
            document.title = debugDisableFBO ? '4DGS Viewer [NO FBO]' : '4DGS Viewer';
        }

        // Number keys 0-9: snap to training cameras
        if (e.code >= 'Digit0' && e.code <= 'Digit9' && !e.ctrlKey && !e.altKey) {
            const camIdx = parseInt(e.code.charAt(5));
            if (header.trainingCameras && camIdx < header.trainingCameras.length) {
                e.preventDefault();
                snapToTrainingCamera(camIdx);
            }
        }
    });

    // ---- Eraser mode ----
    const eraserBar = document.getElementById('eraserBar');
    const eraserCursor = document.getElementById('eraserCursor');
    const eraserRadiusSlider = document.getElementById('eraserRadius');
    const eraserRadiusVal = document.getElementById('eraserRadiusVal');
    const eraserCountEl = document.getElementById('eraserCount');
    let eraserPixelRadius = 20;

    function toggleEraser() {
        eraserMode = !eraserMode;
        eraserBar.classList.toggle('active', eraserMode);
        canvas.classList.toggle('eraser-mode', eraserMode);
        eraserCursor.style.display = eraserMode ? 'block' : 'none';
        updateEraserCursorSize();
    }

    function updateEraserCursorSize() {
        const d = eraserPixelRadius * 2;
        eraserCursor.style.width = d + 'px';
        eraserCursor.style.height = d + 'px';
    }

    function updateEraserCount() {
        eraserCountEl.textContent = `${deletedSet.size} deleted`;
    }

    eraserRadiusSlider.addEventListener('input', () => {
        eraserPixelRadius = parseInt(eraserRadiusSlider.value);
        eraserRadiusVal.textContent = eraserPixelRadius;
        updateEraserCursorSize();
    });

    // Track mouse for eraser cursor
    canvas.addEventListener('mousemove', (e) => {
        if (!eraserMode) return;
        eraserCursor.style.left = (e.clientX - eraserPixelRadius) + 'px';
        eraserCursor.style.top = (e.clientY - eraserPixelRadius) + 'px';
    });

    // Eraser click — project visible Gaussians to screen, delete those within radius
    canvas.addEventListener('click', (e) => {
        if (!eraserMode || !header || !mainPositions || !lastSortedIndices) return;

        const rect = canvas.getBoundingClientRect();
        const mx = (e.clientX - rect.left) * (canvas.width / rect.width);
        const my = (e.clientY - rect.top) * (canvas.height / rect.height);
        const r2 = eraserPixelRadius * eraserPixelRadius * (canvas.width / rect.width) * (canvas.width / rect.width);

        const viewMat = getViewMatrix();

        // Compute focal length (same letterbox logic as render loop)
        let fx, fy;
        let eVpX = 0, eVpY = 0, eVpW = canvas.width, eVpH = canvas.height;
        if (trainingFocal && activeTrainingCam >= 0 && header.trainingCameras) {
            const cam = header.trainingCameras[activeTrainingCam];
            const uniformScale = Math.min(canvas.width / cam.width, canvas.height / cam.height);
            fx = trainingFocal.fx * uniformScale;
            fy = trainingFocal.fy * uniformScale;
            eVpW = Math.round(cam.width * uniformScale);
            eVpH = Math.round(cam.height * uniformScale);
            eVpX = Math.round((canvas.width - eVpW) / 2);
            eVpY = Math.round((canvas.height - eVpH) / 2);
        } else {
            fy = canvas.height / (2 * Math.tan(camera.fov / 2));
            fx = fy;
        }

        const halfW = eVpW * 0.5;
        const halfH = eVpH * 0.5;

        const toDelete = [];
        for (let i = 0; i < lastSortedIndices.length; i++) {
            const gi = lastSortedIndices[i];
            if (deletedSet.has(gi)) continue;

            const px = mainPositions[gi * 3];
            const py = mainPositions[gi * 3 + 1];
            const pz = mainPositions[gi * 3 + 2];

            // Transform to camera space (column-major view matrix)
            const cx = viewMat[0]*px + viewMat[4]*py + viewMat[8]*pz + viewMat[12];
            const cy = viewMat[1]*px + viewMat[5]*py + viewMat[9]*pz + viewMat[13];
            const cz = viewMat[2]*px + viewMat[6]*py + viewMat[10]*pz + viewMat[14];
            if (cz <= 0.01) continue; // behind camera (shader uses tz > 0.01)

            // Project to screen (matches vertex shader, offset by letterbox)
            const invZ = 1.0 / cz;
            const sx = fx * cx * invZ + halfW + eVpX;
            const sy = fy * cy * invZ + halfH + eVpY;

            const dx = sx - mx;
            const dy = sy - my;
            if (dx * dx + dy * dy < r2) {
                toDelete.push(gi);
            }
        }

        if (toDelete.length > 0) {
            deletedHistory.push(toDelete);
            for (const gi of toDelete) deletedSet.add(gi);
            updateEraserCount();
            // Re-filter current sorted indices immediately (no need for full re-sort)
            if (lastSortedIndices) {
                let writeIdx = 0;
                const filtered = new Uint32Array(lastSortedIndices.length);
                for (let i = 0; i < lastSortedIndices.length; i++) {
                    if (!deletedSet.has(lastSortedIndices[i])) {
                        filtered[writeIdx++] = lastSortedIndices[i];
                    }
                }
                gl.bindBuffer(gl.ARRAY_BUFFER, indexBuffer);
                gl.bufferData(gl.ARRAY_BUFFER, filtered.subarray(0, writeIdx), gl.DYNAMIC_DRAW);
                vertexCount = writeIdx;
                visibleCount = writeIdx;
                document.getElementById('visibleVal').textContent =
                    `${visibleCount.toLocaleString()} / ${header.n_gaussians.toLocaleString()}`;
            }
            console.log(`[Eraser] Deleted ${toDelete.length} Gaussians (total: ${deletedSet.size})`);
        }
    });

    // Prevent eraser clicks from triggering camera drag
    const origMouseDown = canvas.onmousedown;
    canvas.addEventListener('mousedown', (e) => {
        if (eraserMode && e.button === 0) {
            e.stopImmediatePropagation();
        }
    }, true); // capture phase to intercept before orbit handler

    // Undo
    document.getElementById('eraserUndo').addEventListener('click', () => {
        if (deletedHistory.length === 0) return;
        const last = deletedHistory.pop();
        for (const gi of last) deletedSet.delete(gi);
        updateEraserCount();
        requestSort();
    });

    // Clear all
    document.getElementById('eraserClear').addEventListener('click', () => {
        if (deletedSet.size === 0) return;
        deletedSet.clear();
        deletedHistory = [];
        updateEraserCount();
        requestSort();
    });

    // 'E' key toggle + Ctrl+Z undo
    window.addEventListener('keydown', (e) => {
        if (e.code === 'KeyE' && !e.ctrlKey && !e.altKey && !e.shiftKey) {
            toggleEraser();
        }
        if (e.code === 'KeyZ' && e.ctrlKey && eraserMode) {
            e.preventDefault();
            document.getElementById('eraserUndo').click();
        }
    });

    // Export cleaned .4dgs file
    document.getElementById('eraserExport').addEventListener('click', async () => {
        if (!loadedFileRef || !header || deletedSet.size === 0) {
            alert('Nothing to export (no deletions made).');
            return;
        }

        const N = header.n_gaussians;
        const keepCount = N - deletedSet.size;
        const nShRest = header.n_sh_coeffs - 1;
        const fpg = 3 + 3 + 4 + 1 + 3 + (nShRest * 3) + 1 + 1 + 3;
        const HEADER_SIZE = 256;

        // Build keep mask
        const keepMask = new Uint8Array(N);
        for (let i = 0; i < N; i++) {
            keepMask[i] = deletedSet.has(i) ? 0 : 1;
        }

        // Read header bytes
        const headerBuf = await loadedFileRef.slice(0, HEADER_SIZE).arrayBuffer();
        const headerOut = new Uint8Array(headerBuf.slice(0));

        // Update n_gaussians in header
        const hv = new DataView(headerOut.buffer);
        hv.setUint32(8, keepCount, true);

        // Read all Gaussian data
        const gaussByteLen = N * fpg * 4;
        const gaussBuf = await loadedFileRef.slice(header.data_offset, header.data_offset + gaussByteLen).arrayBuffer();
        const gaussF32 = new Float32Array(gaussBuf);

        // Copy kept Gaussians
        const outGaussF32 = new Float32Array(keepCount * fpg);
        let outIdx = 0;
        for (let i = 0; i < N; i++) {
            if (!keepMask[i]) continue;
            const srcOff = i * fpg;
            const dstOff = outIdx * fpg;
            for (let j = 0; j < fpg; j++) {
                outGaussF32[dstOff + j] = gaussF32[srcOff + j];
            }
            outIdx++;
        }

        // Handle keyframes if present
        let kfBlob = null;
        if (header.n_keyframes > 0 && header.keyframe_offset > 0) {
            const K = header.n_keyframes;
            const hasRotScale = !!(header.keyframeRotations && header.keyframeScales);
            const kfFloatsPerGauss = K * 3 + (hasRotScale ? K * 4 + K * 3 : 0);
            const kfByteLen = N * kfFloatsPerGauss * 4;
            const kfBuf = await loadedFileRef.slice(header.keyframe_offset, header.keyframe_offset + kfByteLen).arrayBuffer();
            const kfF32 = new Float32Array(kfBuf);
            const outKfF32 = new Float32Array(keepCount * kfFloatsPerGauss);
            let kfOut = 0;
            for (let i = 0; i < N; i++) {
                if (!keepMask[i]) continue;
                const srcOff = i * kfFloatsPerGauss;
                const dstOff = kfOut * kfFloatsPerGauss;
                for (let j = 0; j < kfFloatsPerGauss; j++) {
                    outKfF32[dstOff + j] = kfF32[srcOff + j];
                }
                kfOut++;
            }
            kfBlob = new Uint8Array(outKfF32.buffer);
        }

        // Read camera data (copy as-is between header and gaussian data)
        let camBytes = null;
        if (header.camera_table_offset > 0 && header.camera_table_offset < header.data_offset) {
            const camBuf = await loadedFileRef.slice(header.camera_table_offset, header.data_offset).arrayBuffer();
            camBytes = new Uint8Array(camBuf);
        }

        // Rebuild file: header + cameras + gaussians + keyframes
        // Update offsets in header
        let offset = HEADER_SIZE;
        if (camBytes) {
            hv.setUint32(104, offset, true); // camera_table_offset
            offset += camBytes.byteLength;
        }
        hv.setUint32(88, offset, true); // data_offset
        offset += outGaussF32.byteLength;
        if (kfBlob) {
            hv.setUint32(112, offset, true); // keyframe_offset (byte 112 in header)
            // Note: keyframe_offset is at byte 112 per header parsing
        }

        // Assemble
        const parts = [headerOut];
        if (camBytes) parts.push(camBytes);
        parts.push(new Uint8Array(outGaussF32.buffer));
        if (kfBlob) parts.push(kfBlob);

        const blob = new Blob(parts, { type: 'application/octet-stream' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `cleaned_${deletedSet.size}removed.4dgs`;
        a.click();
        URL.revokeObjectURL(url);

        console.log(`[Export] Saved ${keepCount.toLocaleString()} Gaussians (removed ${deletedSet.size.toLocaleString()})`);
    });

    // ---- Float FBO management ----
    function ensureFBO(w, h) {
        if (!blitProgram) return; // no float FBO support
        if (fbo && fboW === w && fboH === h) return; // already correct size

        // Delete old FBO resources
        if (fbo) { gl.deleteFramebuffer(fbo); fbo = null; }
        if (fboTexture) { gl.deleteTexture(fboTexture); fboTexture = null; }

        // Create RGBA32F texture — full float32 precision to match gsplat's
        // internal accumulation. RGBA16F caused visible dark patches from
        // precision loss when many overlapping Gaussians accumulate.
        fboTexture = gl.createTexture();
        gl.bindTexture(gl.TEXTURE_2D, fboTexture);
        gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA32F, w, h, 0, gl.RGBA, gl.FLOAT, null);
        gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.NEAREST);
        gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.NEAREST);
        gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
        gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);

        // Create framebuffer
        fbo = gl.createFramebuffer();
        gl.bindFramebuffer(gl.FRAMEBUFFER, fbo);
        gl.framebufferTexture2D(gl.FRAMEBUFFER, gl.COLOR_ATTACHMENT0, gl.TEXTURE_2D, fboTexture, 0);

        const status = gl.checkFramebufferStatus(gl.FRAMEBUFFER);
        if (status !== gl.FRAMEBUFFER_COMPLETE) {
            console.error('[FBO] Framebuffer incomplete:', status);
            gl.deleteFramebuffer(fbo);
            gl.deleteTexture(fboTexture);
            fbo = null;
            fboTexture = null;
            blitProgram = null; // disable FBO path
        } else {
            fboW = w;
            fboH = h;
        }

        gl.bindFramebuffer(gl.FRAMEBUFFER, null);
        gl.bindTexture(gl.TEXTURE_2D, null);
    }

    // ---- Render loop ----
    function resize() {
        const dpr = window.devicePixelRatio || 1;
        const w = Math.round(canvas.clientWidth * dpr);
        const h = Math.round(canvas.clientHeight * dpr);
        if (canvas.width !== w || canvas.height !== h) {
            canvas.width = w;
            canvas.height = h;
        }
    }

    function render(timestamp) {
        requestAnimationFrame(render);

        resize();
        const w = canvas.width;
        const h = canvas.height;

        // FPS counter
        fpsFrames++;
        if (timestamp - fpsTick > 500) {
            currentFps = (fpsFrames / ((timestamp - fpsTick) / 1000)).toFixed(0);
            document.getElementById('fpsVal').textContent = currentFps;
            fpsFrames = 0;
            fpsTick = timestamp;
        }

        // Update damped camera tweens
        if (orbitInitialized) {
            const dt = lastFrameTime ? Math.min((timestamp - lastFrameTime) / 1000, 0.05) : 1/60;
            const m1 = orbitTween.update(dt);
            const m2 = distTween.update(dt);
            const m3 = focalTween.update(dt);
            applyTweensToCamera();
            if (m1 || m2 || m3 || isDragging) requestSort();
        }

        // Playback
        if (playing && header) {
            const dt = lastFrameTime ? (timestamp - lastFrameTime) / 1000 : 0;
            frameAccum += dt * header.fps * playSpeed;
            while (frameAccum >= 1) {
                frameAccum -= 1;
                currentFrame++;
                if (currentFrame >= header.total_frames) currentFrame = 0;
            }
            timeSlider.value = currentFrame;
            frameLabel.textContent = `${currentFrame} / ${header.total_frames - 1}`;
        }
        lastFrameTime = timestamp;

        // Re-sort when time changes (sort uses velocity-adjusted positions + temporal culling)
        if (worker && vertexCount > 0 && currentFrame !== render._lastSortedFrame) {
            render._lastSortedFrame = currentFrame;
            requestSort();
        }

        // Determine render resolution: use training camera resolution when snapped
        // (requires FBO for upscaling to viewport), otherwise use viewport resolution.
        const canUseFBO = !!(blitProgram) && !debugDisableFBO;
        let renderW = w, renderH = h;
        let fx, fy;
        // Letterbox viewport: centered sub-region matching training aspect ratio
        let vpX = 0, vpY = 0, vpW = w, vpH = h;
        if (trainingFocal && activeTrainingCam >= 0 && header && header.trainingCameras) {
            const cam = header.trainingCameras[activeTrainingCam];
            const uniformScale = Math.min(w / cam.width, h / cam.height);
            fx = trainingFocal.fx * uniformScale;
            fy = trainingFocal.fy * uniformScale;
            vpW = Math.round(cam.width * uniformScale);
            vpH = Math.round(cam.height * uniformScale);
            vpX = Math.round((w - vpW) / 2);
            vpY = Math.round((h - vpH) / 2);
        } else {
            fy = h / (2 * Math.tan(camera.fov / 2));
            fx = fy;
        }

        // Ensure float FBO matches render resolution
        ensureFBO(renderW, renderH);

        // Bind FBO for float-precision blending (or default canvas if FBO unavailable)
        const useFBO = !!(fbo && blitProgram) && !debugDisableFBO;
        if (useFBO) {
            gl.bindFramebuffer(gl.FRAMEBUFFER, fbo);
            if (!render._fboLogged || render._fboLastRes !== `${renderW}x${renderH}`) {
                console.log(`[FBO] Rendering to RGBA16F FBO ${renderW}x${renderH} (gamma-correct)`);
                render._fboLogged = true;
                render._fboLastRes = `${renderW}x${renderH}`;
            }
        }

        // Clear full canvas/FBO black, then set viewport to letterbox sub-region
        gl.viewport(0, 0, w, h);
        gl.clearColor(0, 0, 0, 1);
        gl.clear(gl.COLOR_BUFFER_BIT);
        gl.viewport(vpX, vpY, vpW, vpH);

        if (!program || vertexCount === 0 || !header) {
            if (useFBO) gl.bindFramebuffer(gl.FRAMEBUFFER, null);
            return;
        }
        const viewMat = getViewMatrix();
        const t = currentFrame / Math.max(1, header.total_frames - 1);

        // Skip drawing when the current time diverges too far from the last
        // sorted time (e.g. at the loop-wrap point). The stale sort indices
        // would reference Gaussians from the wrong part of the sequence,
        // causing a black flash. Hold the previous canvas contents instead.
        if (lastSortedTime >= 0 && Math.abs(t - lastSortedTime) > 0.15) {
            if (useFBO) gl.bindFramebuffer(gl.FRAMEBUFFER, null);
            return;
        }

        gl.useProgram(program);

        gl.uniformMatrix4fv(u_view, false, viewMat);
        gl.uniform2f(u_viewport, vpW, vpH);
        gl.uniform2f(u_focal, fx, fy);
        gl.uniform1f(u_time, t);
        gl.uniform1f(u_sharpnessK, header.sharpness_k || 50.0);
        gl.uniform1i(u_temporalProfile, header.temporal_profile || 0);
        gl.uniform1f(u_lifespanVelocity, header.lifespan_velocity ? 1.0 : 0.0);
        gl.uniform1f(u_lifespanRef, header.lifespan_ref);
        gl.uniform1f(u_durClampMin, header.duration_clamp_min);
        gl.uniform1f(u_durClampMax, header.duration_clamp_max);
        gl.uniform1f(u_sceneExtent, header.scene_extent || 1.0);
        gl.uniform1i(u_dataTexW, dataTexW);
        // Always compute stride from actual texture layout (cannot change at runtime)
        // Use stored flag if available (set during texture build, survives streaming cleanup)
        const _dataHasRSKF = header._hasRotScaleKFBuilt !== undefined
            ? header._hasRotScaleKFBuilt
            : !!(header.keyframeRotations && header.keyframeScales);
        const _posKFTex = nKeyframes > 0 ? Math.ceil(nKeyframes * 3 / 4) : 0;
        const _rotKFTex = _dataHasRSKF ? nKeyframes : 0;
        const _scaleKFTex = _dataHasRSKF ? Math.ceil(nKeyframes * 3 / 4) : 0;
        gl.uniform1i(u_texelsPerGauss, 16 + _posKFTex + _rotKFTex + _scaleKFTex);
        gl.uniform1i(u_nKeyframes, nKeyframes);
        // Debug: force pre-baked covariance by telling shader keyframes don't exist
        gl.uniform1i(u_hasRotScaleKF, (_dataHasRSKF && !debugForcePrebakedCov) ? 1 : 0);
        gl.uniform3f(u_camPos, camera.position[0], camera.position[1], camera.position[2]);
        gl.uniform1i(u_renderSHDeg, parseInt(document.getElementById('shDegSlider').value));
        gl.uniform1f(u_maxScale, parseFloat(document.getElementById('maxScaleSlider').value));
        gl.uniform1f(u_minOpacity, parseFloat(document.getElementById('minOpaInput').value));
        gl.uniform1i(u_visualMode, parseInt(document.getElementById('visualMode').value) || 0);
        const ptChecked = document.getElementById('pointMode').checked;
        gl.uniform1f(u_pointSize, ptChecked ? parseFloat(document.getElementById('pointSize').value) : 0.0);
        const ringChecked = document.getElementById('ringMode').checked;
        gl.uniform1f(u_ringSize, ringChecked ? 0.03 : 0.0);
        gl.uniform1i(u_gammaCorrect, useFBO ? 1 : 0);

        gl.activeTexture(gl.TEXTURE0);
        gl.bindTexture(gl.TEXTURE_2D, dataTexture);
        gl.uniform1i(u_dataTexture, 0);

        gl.bindVertexArray(vao);
        gl.drawArraysInstanced(gl.TRIANGLE_STRIP, 0, 4, vertexCount);
        gl.bindVertexArray(null);

        // Blit FBO to canvas (tonemap float → uint8)
        if (useFBO) {
            gl.bindFramebuffer(gl.FRAMEBUFFER, null);
            gl.viewport(0, 0, w, h);
            gl.clearColor(0, 0, 0, 1);
            gl.clear(gl.COLOR_BUFFER_BIT);

            gl.disable(gl.BLEND);

            gl.useProgram(blitProgram);
            gl.activeTexture(gl.TEXTURE0);
            gl.bindTexture(gl.TEXTURE_2D, fboTexture);
            gl.uniform1i(u_blit_tex, 0);
            const satVal = document.getElementById('saturationSlider');
            gl.uniform1f(u_blit_saturation, satVal ? parseFloat(satVal.value) : 1.0);
            const conVal = document.getElementById('contrastSlider');
            gl.uniform1f(u_blit_contrast, conVal ? parseFloat(conVal.value) : 1.0);

            gl.bindVertexArray(blitVAO);
            gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
            gl.bindVertexArray(null);

            gl.enable(gl.BLEND);
        }
    }

    requestAnimationFrame(render);

})();
</script>
</body>
</html>
